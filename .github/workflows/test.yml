name: Get ONS articles

on:
  push:
  workflow_dispatch:
  schedule:
    - cron:  '35 4 * * *'
    
permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    if: ${{ github.repository != 'simonw/shot-scraper-template' }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - uses: actions/cache@v3
      name: Configure pip caching
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Fetch articles JSON
      run: |
        curl -L "https://raw.githubusercontent.com/ONSdigital/get-ons-vis-screenshots/refs/heads/main/articles-and-dvcs.json" -o articles-and-dvcs.json
    - name: Install notebook runner
      run: |
        python -m pip install --upgrade pip
        pip install jupyter
    - name: Run notebook
      run: |
        python -m jupyter nbconvert --to notebook --execute onsvisualjournalism.ipynb --output onsvisualjournalism-output.ipynb --output-dir /tmp
    - name: Commit and push
      run: |-
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        timestamp=$(date -u)
        git commit -m "${timestamp}" || exit 0
        git pull --rebase
        git push